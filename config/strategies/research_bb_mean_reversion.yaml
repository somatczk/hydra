id: research-bb-mean-reversion
name: "Research: BB Mean-Reversion"
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1d
parameters:
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_below
          value: "bollinger_lower:period=20,std_dev=2.0"
        - indicator: rsi
          params: {period: 14}
          comparator: less_than
          value: 30
    exit_long:
      operator: OR
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_above
          value: "bollinger_middle:period=20,std_dev=2.0"
        - indicator: rsi
          params: {period: 14}
          comparator: greater_than
          value: 60
    entry_short: null
    exit_short: null
  required_history: 200
  description: "Day et al. 2023 / Glucksmann ETH Zurich. Buy at lower BB touch with RSI<30 confirmation. Exit at middle BB. Long-only. Enhanced version achieved Sharpe 3.2. Only 34% time in market provides natural drawdown protection."
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 1.5
  max_position_pct: 15.0
