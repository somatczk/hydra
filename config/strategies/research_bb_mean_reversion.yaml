id: research-bb-mean-reversion
name: "Research: BB Mean-Reversion with Trend Filter"
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1d
parameters:
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_below
          value: "bollinger_lower:period=60,std_dev=2.0"
        - indicator: close
          params: {}
          comparator: greater_than
          value: "sma:period=200"
    exit_long:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_above
          value: "bollinger_middle:period=60,std_dev=2.0"
    entry_short: null
    exit_short: null
  required_history: 210
  description: "Day et al. 2023: BB(60,2) AHPR >50%. SMA(200) trend filter per Gerritsen et al.: counter-trend BB underperforms BH without regime gating. Long-only."
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 1.5
  max_position_pct: 15.0
