id: research-sma-trend
name: "Research: SMA Trend Timing"
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1d
parameters:
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: greater_than
          value: "sma:period=50"
    exit_long:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: less_than
          value: "sma:period=50"
    entry_short: null
    exit_short: null
  required_history: 60
  description: "Detzel et al. 2021 / Grayscale 2023. Price > SMA(50) → long, else cash. Sharpe 1.9 vs 1.3 BH (Jan 2012–Jul 2023). MA(5–100) timing improves Sharpe and reduces drawdowns."
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 2.0
  max_position_pct: 25.0
