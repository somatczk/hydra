id: trend-supertrend
name: Trend Following EMA Crossover
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1h
  confirmation: 4h
parameters:
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: ema
          params: {period: 50}
          comparator: crosses_above
          value: "ema:period=200"
          param_key: ema_fast
          value_ref_overrides:
            ema_slow: period
        - indicator: rsi
          params: {period: 14}
          comparator: greater_than
          value: 50
          param_key: rsi_period
    exit_long:
      operator: OR
      conditions:
        - indicator: ema
          params: {period: 50}
          comparator: crosses_below
          value: "ema:period=200"
          param_key: ema_fast
          value_ref_overrides:
            ema_slow: period
        - indicator: rsi
          params: {period: 14}
          comparator: less_than
          value: 35
          param_key: rsi_period
    entry_short:
      operator: AND
      conditions:
        - indicator: ema
          params: {period: 50}
          comparator: crosses_below
          value: "ema:period=200"
          param_key: ema_fast
          value_ref_overrides:
            ema_slow: period
        - indicator: rsi
          params: {period: 14}
          comparator: less_than
          value: 50
          param_key: rsi_period
    exit_short:
      operator: OR
      conditions:
        - indicator: ema
          params: {period: 50}
          comparator: crosses_above
          value: "ema:period=200"
          param_key: ema_fast
          value_ref_overrides:
            ema_slow: period
        - indicator: rsi
          params: {period: 14}
          comparator: greater_than
          value: 65
          param_key: rsi_period
  required_history: 200
  description: Trend-following strategy using EMA(50)/EMA(200) crossover with RSI momentum filter. Confirms trend direction on 4H.
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 2.0
  max_position_pct: 10.0
