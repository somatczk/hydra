id: momentum-rsi-macd
name: Momentum RSI + MACD
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1h
parameters:
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: rsi
          params: {period: 14}
          comparator: less_than
          value: 30
        - indicator: macd
          params: {fast: 12, slow: 26, signal: 9}
          comparator: crosses_above
          value: 0
    exit_long:
      operator: OR
      conditions:
        - indicator: rsi
          params: {period: 14}
          comparator: greater_than
          value: 70
        - indicator: macd
          params: {fast: 12, slow: 26, signal: 9}
          comparator: crosses_below
          value: 0
    entry_short:
      operator: AND
      conditions:
        - indicator: rsi
          params: {period: 14}
          comparator: greater_than
          value: 70
        - indicator: macd
          params: {fast: 12, slow: 26, signal: 9}
          comparator: crosses_below
          value: 0
    exit_short:
      operator: OR
      conditions:
        - indicator: rsi
          params: {period: 14}
          comparator: less_than
          value: 30
        - indicator: macd
          params: {fast: 12, slow: 26, signal: 9}
          comparator: crosses_above
          value: 0
  required_history: 50
  description: Momentum strategy combining RSI oversold/overbought with MACD zero-line crossovers for entry confirmation.
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 2.0
  max_position_pct: 10.0
