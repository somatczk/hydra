id: dual-sma-trend-follower
name: Dual SMA Trend Follower
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1h
parameters:
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: sma
          params:
            period: 20
          comparator: crosses_above
          value: "sma:period=50"
          param_key: sma_fast
          value_ref_overrides:
            sma_slow: period
    exit_long:
      operator: AND
      conditions:
        - indicator: sma
          params:
            period: 20
          comparator: crosses_below
          value: "sma:period=50"
          param_key: sma_fast
          value_ref_overrides:
            sma_slow: period
    entry_short:
      operator: AND
      conditions:
        - indicator: sma
          params:
            period: 20
          comparator: crosses_below
          value: "sma:period=50"
          param_key: sma_fast
          value_ref_overrides:
            sma_slow: period
    exit_short:
      operator: AND
      conditions:
        - indicator: sma
          params:
            period: 20
          comparator: crosses_above
          value: "sma:period=50"
          param_key: sma_fast
          value_ref_overrides:
            sma_slow: period
  required_history: 60
  description: >-
    Dual SMA crossover trend-following strategy on 1H. Research: 1-week MA
    Sharpe of 2.48, shorter windows outperform. Uses SMA(20) crossing SMA(50)
    for trend direction.
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 1.0
  max_position_pct: 10.0
