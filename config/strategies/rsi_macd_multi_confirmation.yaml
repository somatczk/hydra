id: rsi-macd-multi-confirmation
name: RSI + MACD Multi Confirmation
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 4h
parameters:
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: rsi
          params:
            period: 14
          comparator: greater_than
          value: 50
        - indicator: macd
          params:
            fast: 12
            slow: 26
            signal: 9
          comparator: greater_than
          value: 0
    exit_long:
      operator: OR
      conditions:
        - indicator: rsi
          params:
            period: 14
          comparator: less_than
          value: 40
        - indicator: macd
          params:
            fast: 12
            slow: 26
            signal: 9
          comparator: less_than
          value: 0
    entry_short:
      operator: AND
      conditions:
        - indicator: rsi
          params:
            period: 14
          comparator: less_than
          value: 50
        - indicator: macd
          params:
            fast: 12
            slow: 26
            signal: 9
          comparator: less_than
          value: 0
    exit_short:
      operator: OR
      conditions:
        - indicator: rsi
          params:
            period: 14
          comparator: greater_than
          value: 60
        - indicator: macd
          params:
            fast: 12
            slow: 26
            signal: 9
          comparator: greater_than
          value: 0
  required_history: 50
  description: >-
    Multi-indicator confirmation strategy on 4H combining RSI and MACD.
    Research: MACD combined with RSI achieves 77% win rate. Requires both
    indicators to agree for entries, exits on either diverging.
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 1.0
  max_position_pct: 10.0
