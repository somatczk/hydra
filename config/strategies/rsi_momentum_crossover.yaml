id: rsi-momentum-crossover
name: RSI Momentum Crossover
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 4h
parameters:
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: rsi
          params:
            period: 14
          comparator: crosses_above
          value: 30
    exit_long:
      operator: AND
      conditions:
        - indicator: rsi
          params:
            period: 14
          comparator: crosses_above
          value: 70
    entry_short:
      operator: AND
      conditions:
        - indicator: rsi
          params:
            period: 14
          comparator: crosses_below
          value: 70
    exit_short:
      operator: AND
      conditions:
        - indicator: rsi
          params:
            period: 14
          comparator: crosses_below
          value: 30
  required_history: 50
  description: >-
    RSI crossover strategy on 4H timeframe. Research shows Sharpe 5.13,
    60% win rate, -5.2% max drawdown. Enters long on RSI recovering above 30,
    exits at overbought 70. Mirrors for short.
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 1.0
  max_position_pct: 10.0
