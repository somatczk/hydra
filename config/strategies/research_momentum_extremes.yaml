id: research-momentum-extremes
name: "Research: Momentum at Extremes"
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1d
parameters:
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: rsi
          params: {period: 10}
          comparator: greater_than
          value: 65
        - indicator: ema
          params: {period: 5}
          comparator: crosses_above
          value: "ema:period=20"
    exit_long:
      operator: OR
      conditions:
        - indicator: rsi
          params: {period: 10}
          comparator: less_than
          value: 45
        - indicator: ema
          params: {period: 5}
          comparator: crosses_below
          value: "ema:period=20"
    entry_short: null
    exit_short: null
  required_history: 30
  description: "Padysak & Vojtko 2022, OOS-confirmed by Beluska & Vojtko 2024. MAX strategy: buy at local 10-day highs (RSI>65 + short EMA breakout). Trend-following component survived 2022 bear market. Long-only. Return/vol ratio 2.06."
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 2.0
  max_position_pct: 20.0
