id: research-momentum-extremes
name: "Research: Momentum at Extremes (MAX)"
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1d
parameters:
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: equals
          value: "rolling_max:period=20"
    exit_long:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: less_than
          value: "rolling_max:period=20"
    entry_short: null
    exit_short: null
  required_history: 25
  description: "Quantpedia 2022 / Beluska & Vojtko 2024. MAX(20) trend leg only. Hold BTC on day t+1 if close_t == rolling_max(20). Return/vol 2.06. OOS: MAX held up, MIN degraded — using MAX only."
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 2.0
  max_position_pct: 20.0
