id: breakout
name: Breakout Scanner
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1h
parameters:
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_above
          value: "bollinger_upper:period=20,std_dev=2.0"
        - indicator: atr
          params: {period: 14}
          comparator: greater_than
          value: 0
    exit_long:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_below
          value: "bollinger_upper:period=20,std_dev=2.0"
    entry_short:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_below
          value: "bollinger_lower:period=20,std_dev=2.0"
        - indicator: atr
          params: {period: 14}
          comparator: greater_than
          value: 0
    exit_short:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_above
          value: "bollinger_lower:period=20,std_dev=2.0"
  required_history: 30
  description: Volume-weighted breakout detection using Bollinger Band breakouts with ATR volatility confirmation
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 1.5
  max_position_pct: 10.0
