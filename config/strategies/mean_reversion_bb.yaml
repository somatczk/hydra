id: mean-reversion-bb
name: Mean Reversion Bollinger Bands
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1h
parameters:
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_below
          value: "bollinger_lower:period=20,std_dev=2.0"
        - indicator: rsi
          params: {period: 14}
          comparator: less_than
          value: 30
    exit_long:
      operator: OR
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_above
          value: "bollinger_middle:period=20,std_dev=2.0"
        - indicator: rsi
          params: {period: 14}
          comparator: greater_than
          value: 60
    entry_short:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_above
          value: "bollinger_upper:period=20,std_dev=2.0"
        - indicator: rsi
          params: {period: 14}
          comparator: greater_than
          value: 70
    exit_short:
      operator: OR
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_below
          value: "bollinger_middle:period=20,std_dev=2.0"
        - indicator: rsi
          params: {period: 14}
          comparator: less_than
          value: 40
  required_history: 30
  description: RSI-based mean reversion with Bollinger Band confirmation. Enters on band touches with RSI extremes, exits at mid-band.
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 2.0
  max_position_pct: 10.0
