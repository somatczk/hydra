id: research-donchian-breakout
name: "Research: Donchian Breakout (60d)"
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1d
parameters:
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_above
          value: "rolling_max:period=60"
    exit_long:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_below
          value: "rolling_mid:period=60"
    entry_short: null
    exit_short: null
  required_history: 65
  description: "Zarattini et al. 2025 single-horizon (60d) approximation. Full ensemble: CAGR ~30%, Sharpe ~1.58, max DD ~19%. Donchian on closes, not highs/lows. Mid-channel trailing stop."
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 2.0
  max_position_pct: 20.0
