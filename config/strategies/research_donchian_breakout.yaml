id: research-donchian-breakout
name: "Research: Donchian Breakout Ensemble"
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1d
parameters:
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_above
          value: "bollinger_upper:period=15,std_dev=2.0"
        - indicator: rsi
          params: {period: 14}
          comparator: greater_than
          value: 55
    exit_long:
      operator: OR
      conditions:
        - indicator: close
          params: {}
          comparator: crosses_below
          value: "bollinger_lower:period=15,std_dev=2.0"
        - indicator: rsi
          params: {period: 14}
          comparator: less_than
          value: 40
    entry_short: null
    exit_short: null
  required_history: 30
  description: "Zarattini et al. 2025 / QuantifiedStrategies. Donchian-style breakout adapted to BB upper band break with RSI momentum confirmation. Long-only. Calmar ratio ~1.58, 19% max drawdown."
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 2.0
  max_position_pct: 20.0
