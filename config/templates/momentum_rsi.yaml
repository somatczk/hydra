name: RSI Momentum
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1h
parameters:
  description: Classic RSI oversold/overbought mean-reversion strategy. Buys when RSI drops below 30, sells when it rises above 70.
  required_history: 50
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: rsi
          params: {period: 14}
          comparator: less_than
          value: 30
    exit_long:
      operator: AND
      conditions:
        - indicator: rsi
          params: {period: 14}
          comparator: greater_than
          value: 70
    entry_short: null
    exit_short: null
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 1.0
  max_position_pct: 10.0
_template_meta:
  description: Classic RSI oversold/overbought strategy. Buys on RSI < 30, sells on RSI > 70. Conservative entry with clear exit.
  type: rule_based
  risk_level: conservative
  expected_sharpe: 0.8
  expected_max_drawdown: 15.0
  recommended_capital: 5000
