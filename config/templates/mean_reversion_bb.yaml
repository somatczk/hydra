name: Bollinger Band Bounce
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1h
parameters:
  description: Mean reversion using Bollinger Bands. Buys when price touches lower band with RSI confirmation, exits at middle band.
  required_history: 50
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: bollinger_bands
          params: {period: 20, std_dev: 2.0}
          comparator: less_than
          value: 0
        - indicator: rsi
          params: {period: 14}
          comparator: less_than
          value: 40
    exit_long:
      operator: AND
      conditions:
        - indicator: bollinger_bands
          params: {period: 20, std_dev: 2.0}
          comparator: greater_than
          value: 0.5
    entry_short: null
    exit_short: null
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 1.0
  max_position_pct: 8.0
_template_meta:
  description: Mean reversion with Bollinger Bands + RSI confirmation. Buys at lower band, exits at middle band. Good in ranging markets.
  type: rule_based
  risk_level: moderate
  expected_sharpe: 1.1
  expected_max_drawdown: 12.0
  recommended_capital: 5000
