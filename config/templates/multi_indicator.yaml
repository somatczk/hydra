name: Triple Confirmation
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1h
parameters:
  description: Multi-indicator strategy requiring RSI + MACD + EMA alignment. High-confidence entries with multiple confirmations.
  required_history: 50
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: rsi
          params: {period: 14}
          comparator: less_than
          value: 35
        - indicator: macd
          params: {fast: 12, slow: 26, signal: 9}
          comparator: crosses_above
          value: 0
        - indicator: ema
          params: {period: 20}
          comparator: greater_than
          value: 0
    exit_long:
      operator: OR
      conditions:
        - indicator: rsi
          params: {period: 14}
          comparator: greater_than
          value: 75
        - indicator: macd
          params: {fast: 12, slow: 26, signal: 9}
          comparator: crosses_below
          value: 0
    entry_short: null
    exit_short: null
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 1.5
  max_position_pct: 10.0
_template_meta:
  description: Triple confirmation (RSI + MACD + EMA) for high-probability entries. Fewer trades but higher win rate. Works across market conditions.
  type: rule_based
  risk_level: conservative
  expected_sharpe: 1.2
  expected_max_drawdown: 10.0
  recommended_capital: 5000
