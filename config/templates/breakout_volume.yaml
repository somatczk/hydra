name: Volume Breakout
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 1h
parameters:
  description: Breakout strategy that enters when price breaks above Bollinger upper band with above-average volume confirmation.
  required_history: 50
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: bollinger_bands
          params: {period: 20, std_dev: 2.0}
          comparator: greater_than
          value: 1.0
        - indicator: atr
          params: {period: 14}
          comparator: greater_than
          value: 0
    exit_long:
      operator: AND
      conditions:
        - indicator: bollinger_bands
          params: {period: 20, std_dev: 2.0}
          comparator: less_than
          value: 0.5
    entry_short: null
    exit_short: null
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 2.0
  max_position_pct: 12.0
_template_meta:
  description: Volatility breakout with Bollinger Band expansion. Aggressive entries on high-momentum moves. Best in volatile markets.
  type: rule_based
  risk_level: aggressive
  expected_sharpe: 1.3
  expected_max_drawdown: 22.0
  recommended_capital: 10000
