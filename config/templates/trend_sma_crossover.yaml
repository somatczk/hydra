name: SMA Crossover Trend
strategy_class: hydra.strategy.builtin.rule_based.RuleBasedStrategy
enabled: false
symbols:
  - BTCUSDT
exchange:
  exchange_id: binance
  market_type: SPOT
timeframes:
  primary: 4h
parameters:
  description: Trend-following strategy using SMA 20/50 crossover. Enters on golden cross, exits on death cross.
  required_history: 60
  rules:
    entry_long:
      operator: AND
      conditions:
        - indicator: sma
          params: {period: 20}
          comparator: crosses_above
          value: sma_50
    exit_long:
      operator: AND
      conditions:
        - indicator: sma
          params: {period: 20}
          comparator: crosses_below
          value: sma_50
    entry_short: null
    exit_short: null
position_sizing:
  method: fixed_fractional
  risk_per_trade_pct: 1.5
  max_position_pct: 15.0
_template_meta:
  description: Classic SMA golden/death cross on 4h timeframe. Trend-following with wide stops. Best in trending markets.
  type: rule_based
  risk_level: moderate
  expected_sharpe: 0.9
  expected_max_drawdown: 18.0
  recommended_capital: 10000
