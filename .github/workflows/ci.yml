name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: [self-hosted, romulus]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  type-check:
    name: Type Check
    runs-on: [self-hosted, romulus]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run mypy src/ --strict

  security:
    name: Security Scan
    runs-on: [self-hosted, romulus]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run bandit -r src/ -c pyproject.toml

  unit-tests:
    name: Unit Tests
    runs-on: [self-hosted, romulus]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run pytest tests/unit/ --cov -m "not slow" --junitxml=junit.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: junit.xml

  integration-tests:
    name: Integration Tests
    runs-on: [self-hosted, romulus]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --extra dev

      - name: Start test infrastructure
        run: |
          docker run -d --name hydra-test-pg-${{ github.run_id }} \
            -e POSTGRES_DB=hydra_test -e POSTGRES_USER=hydra -e POSTGRES_PASSWORD=test \
            -p 15432:5432 \
            --health-cmd "pg_isready -U hydra" --health-interval 5s --health-retries 10 \
            timescale/timescaledb:2.17.2-pg16
          docker run -d --name hydra-test-redis-${{ github.run_id }} \
            -p 16379:6379 \
            --health-cmd "redis-cli ping" --health-interval 5s --health-retries 10 \
            redis:7-alpine
          for i in $(seq 1 30); do
            docker inspect --format='{{.State.Health.Status}}' hydra-test-pg-${{ github.run_id }} 2>/dev/null | grep -q healthy && break
            sleep 2
          done
          for i in $(seq 1 15); do
            docker inspect --format='{{.State.Health.Status}}' hydra-test-redis-${{ github.run_id }} 2>/dev/null | grep -q healthy && break
            sleep 1
          done

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v -m integration --no-header || [ $? -eq 5 ]
        env:
          HYDRA_DB_HOST: localhost
          HYDRA_DB_PORT: "15432"
          HYDRA_DB_NAME: hydra_test
          HYDRA_DB_USER: hydra
          HYDRA_DB_PASSWORD: test
          HYDRA_REDIS_URL: redis://localhost:16379/0

      - name: Cleanup test infrastructure
        if: always()
        run: |
          docker rm -f hydra-test-pg-${{ github.run_id }} 2>/dev/null || true
          docker rm -f hydra-test-redis-${{ github.run_id }} 2>/dev/null || true

  e2e-tests:
    name: E2E Tests
    runs-on: [self-hosted, romulus]
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --extra dev

      - name: Start test infrastructure
        run: |
          docker run -d --name hydra-e2e-pg-${{ github.run_id }} \
            -e POSTGRES_DB=hydra_test -e POSTGRES_USER=hydra -e POSTGRES_PASSWORD=test \
            -p 25432:5432 \
            --health-cmd "pg_isready -U hydra" --health-interval 5s --health-retries 10 \
            timescale/timescaledb:2.17.2-pg16
          docker run -d --name hydra-e2e-redis-${{ github.run_id }} \
            -p 26379:6379 \
            --health-cmd "redis-cli ping" --health-interval 5s --health-retries 10 \
            redis:7-alpine
          for i in $(seq 1 30); do
            docker inspect --format='{{.State.Health.Status}}' hydra-e2e-pg-${{ github.run_id }} 2>/dev/null | grep -q healthy && break
            sleep 2
          done
          for i in $(seq 1 15); do
            docker inspect --format='{{.State.Health.Status}}' hydra-e2e-redis-${{ github.run_id }} 2>/dev/null | grep -q healthy && break
            sleep 1
          done

      - name: Run e2e tests
        run: uv run pytest tests/e2e/ -v -m e2e --no-header || [ $? -eq 5 ]
        env:
          HYDRA_DB_HOST: localhost
          HYDRA_DB_PORT: "25432"
          HYDRA_DB_NAME: hydra_test
          HYDRA_DB_USER: hydra
          HYDRA_DB_PASSWORD: test
          HYDRA_REDIS_URL: redis://localhost:26379/0

      - name: Cleanup test infrastructure
        if: always()
        run: |
          docker rm -f hydra-e2e-pg-${{ github.run_id }} 2>/dev/null || true
          docker rm -f hydra-e2e-redis-${{ github.run_id }} 2>/dev/null || true
