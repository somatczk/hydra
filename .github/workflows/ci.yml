name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: [self-hosted, hydra]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  type-check:
    name: Type Check
    runs-on: [self-hosted, hydra]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run mypy src/hydra/core/ src/hydra/data/ src/hydra/indicators/ src/hydra/strategy/ src/hydra/backtest/ src/hydra/execution/ src/hydra/risk/ src/hydra/portfolio/ --strict

  security:
    name: Security Scan
    runs-on: [self-hosted, hydra]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run bandit -r src/ -c pyproject.toml

  unit-tests:
    name: Unit Tests
    runs-on: [self-hosted, hydra]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run pytest tests/unit/ --cov -m "not slow" --junitxml=junit.xml
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: junit.xml

  integration-tests:
    name: Integration Tests
    runs-on: [self-hosted, hydra]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --extra dev

      - name: Start test infrastructure
        id: infra
        run: |
          docker rm -f hydra-int-pg-${{ github.run_id }} hydra-int-redis-${{ github.run_id }} 2>/dev/null || true
          docker run -d --name hydra-int-pg-${{ github.run_id }} \
            -e POSTGRES_DB=hydra_test -e POSTGRES_USER=hydra -e POSTGRES_PASSWORD=test \
            -p 0:5432 \
            --health-cmd "pg_isready -U hydra" --health-interval 5s --health-retries 10 \
            timescale/timescaledb:2.17.2-pg16
          docker run -d --name hydra-int-redis-${{ github.run_id }} \
            -p 0:6379 \
            --health-cmd "redis-cli ping" --health-interval 5s --health-retries 10 \
            redis:7-alpine
          PG_PORT=$(docker port hydra-int-pg-${{ github.run_id }} 5432 | cut -d: -f2)
          REDIS_PORT=$(docker port hydra-int-redis-${{ github.run_id }} 6379 | cut -d: -f2)
          echo "pg_port=$PG_PORT" >> $GITHUB_OUTPUT
          echo "redis_port=$REDIS_PORT" >> $GITHUB_OUTPUT
          for i in $(seq 1 30); do
            docker inspect --format='{{.State.Health.Status}}' hydra-int-pg-${{ github.run_id }} 2>/dev/null | grep -q healthy && break
            sleep 2
          done
          for i in $(seq 1 15); do
            docker inspect --format='{{.State.Health.Status}}' hydra-int-redis-${{ github.run_id }} 2>/dev/null | grep -q healthy && break
            sleep 1
          done

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v -m integration --no-header || [ $? -eq 5 ]
        env:
          HYDRA_DB_HOST: localhost
          HYDRA_DB_PORT: ${{ steps.infra.outputs.pg_port }}
          HYDRA_DB_NAME: hydra_test
          HYDRA_DB_USER: hydra
          HYDRA_DB_PASSWORD: test
          HYDRA_REDIS_URL: redis://localhost:${{ steps.infra.outputs.redis_port }}/0

      - name: Cleanup test infrastructure
        if: always()
        run: |
          docker rm -f hydra-int-pg-${{ github.run_id }} 2>/dev/null || true
          docker rm -f hydra-int-redis-${{ github.run_id }} 2>/dev/null || true

  e2e-tests:
    name: E2E Tests
    runs-on: [self-hosted, hydra]
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --extra dev

      - name: Start test infrastructure
        id: e2e-infra
        run: |
          docker rm -f hydra-e2e-pg-${{ github.run_id }} hydra-e2e-redis-${{ github.run_id }} 2>/dev/null || true
          docker run -d --name hydra-e2e-pg-${{ github.run_id }} \
            -e POSTGRES_DB=hydra_test -e POSTGRES_USER=hydra -e POSTGRES_PASSWORD=test \
            -p 0:5432 \
            --health-cmd "pg_isready -U hydra" --health-interval 5s --health-retries 10 \
            timescale/timescaledb:2.17.2-pg16
          docker run -d --name hydra-e2e-redis-${{ github.run_id }} \
            -p 0:6379 \
            --health-cmd "redis-cli ping" --health-interval 5s --health-retries 10 \
            redis:7-alpine
          PG_PORT=$(docker port hydra-e2e-pg-${{ github.run_id }} 5432 | cut -d: -f2)
          REDIS_PORT=$(docker port hydra-e2e-redis-${{ github.run_id }} 6379 | cut -d: -f2)
          echo "pg_port=$PG_PORT" >> $GITHUB_OUTPUT
          echo "redis_port=$REDIS_PORT" >> $GITHUB_OUTPUT
          for i in $(seq 1 30); do
            docker inspect --format='{{.State.Health.Status}}' hydra-e2e-pg-${{ github.run_id }} 2>/dev/null | grep -q healthy && break
            sleep 2
          done
          for i in $(seq 1 15); do
            docker inspect --format='{{.State.Health.Status}}' hydra-e2e-redis-${{ github.run_id }} 2>/dev/null | grep -q healthy && break
            sleep 1
          done

      - name: Run e2e tests
        run: uv run pytest tests/e2e/ -v -m e2e --no-header || [ $? -eq 5 ]
        env:
          HYDRA_DB_HOST: localhost
          HYDRA_DB_PORT: ${{ steps.e2e-infra.outputs.pg_port }}
          HYDRA_DB_NAME: hydra_test
          HYDRA_DB_USER: hydra
          HYDRA_DB_PASSWORD: test
          HYDRA_REDIS_URL: redis://localhost:${{ steps.e2e-infra.outputs.redis_port }}/0

      - name: Cleanup test infrastructure
        if: always()
        run: |
          docker rm -f hydra-e2e-pg-${{ github.run_id }} 2>/dev/null || true
          docker rm -f hydra-e2e-redis-${{ github.run_id }} 2>/dev/null || true
