name: Build & Push Docker Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docker/**'
      - 'dashboard/**'
      - 'pyproject.toml'

permissions:
  contents: read
  packages: write

jobs:
  version:
    name: Determine Version
    runs-on: [self-hosted, hydra]
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Login to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Compute next semver tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          # Get latest semver tag from GHCR for hydra-engine
          LATEST=$(gh api user/packages/container/hydra-engine/versions \
            --jq '[.[].metadata.container.tags[] | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))] | sort_by(split(".") | map(tonumber)) | last // empty' 2>/dev/null || true)

          if [ -z "$LATEST" ]; then
            NEXT="0.1.0"
          else
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "Latest: ${LATEST:-none}, Next: $NEXT"
          echo "tag=$NEXT" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.image }}
    needs: version
    runs-on: [self-hosted, hydra]
    strategy:
      matrix:
        include:
          - image: hydra-engine
            dockerfile: docker/Dockerfile.engine
            context: .
          - image: hydra-dashboard
            dockerfile: docker/Dockerfile.dashboard
            context: .
          - image: hydra-backtest
            dockerfile: docker/Dockerfile.backtest
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        env:
          TAG: ${{ needs.version.outputs.tag }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
        run: |
          docker build --load \
            -f ${{ matrix.dockerfile }} \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:main" \
            ${{ matrix.context }}

      - name: Push image
        env:
          TAG: ${{ needs.version.outputs.tag }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
        run: |
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:main"
