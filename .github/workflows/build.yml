name: Build & Push Docker Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docker/**'
      - 'dashboard/**'
      - 'pyproject.toml'

permissions:
  contents: read
  packages: write

jobs:
  version:
    name: Determine Version
    runs-on: [self-hosted, hydra]
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Read version from pyproject.toml
        id: version
        run: |
          TAG=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Version: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.image }}
    needs: version
    runs-on: [self-hosted, hydra]
    strategy:
      matrix:
        include:
          - image: hydra-engine
            dockerfile: docker/engine/Dockerfile
            context: .
          - image: hydra-dashboard
            dockerfile: docker/dashboard/Dockerfile
            context: .
          - image: hydra-backtest
            dockerfile: docker/backtest/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        env:
          TAG: ${{ needs.version.outputs.tag }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
        run: |
          docker build --load \
            -f ${{ matrix.dockerfile }} \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:main" \
            ${{ matrix.context }}

      - name: Push image
        env:
          TAG: ${{ needs.version.outputs.tag }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
        run: |
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:main"
