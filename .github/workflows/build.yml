name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docker/**'
      - 'dashboard/**'
      - 'pyproject.toml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: hydra-engine
            dockerfile: docker/Dockerfile.engine
            context: .
          - image: hydra-dashboard
            dockerfile: docker/Dockerfile.dashboard
            context: .
          - image: hydra-backtest
            dockerfile: docker/Dockerfile.backtest
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set image tag
        id: tag
        run: echo "sha=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build \
            -f ${{ matrix.dockerfile }} \
            -t ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.tag.outputs.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:main \
            ${{ matrix.context }}

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.tag.outputs.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:main
