name: Bump Romulus Image Tags

on:
  workflow_run:
    workflows: ["Build & Push Docker Images"]
    types: [completed]
    branches: [main]

jobs:
  bump:
    name: Update Romulus Dockerfiles
    runs-on: [self-hosted, hydra]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: somatczk/romulus
          token: ${{ secrets.ROMULUS_PAT }}
          path: romulus

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update Dockerfile tags
        run: |
          cd romulus
          for service in engine dashboard backtest-worker; do
            dockerfile="stacks/hydra/${service}/Dockerfile"
            if [ -f "$dockerfile" ]; then
              image_name="hydra-${service}"
              [ "$service" = "backtest-worker" ] && image_name="hydra-backtest"
              sed -i "s|ghcr.io/somatczk/${image_name}:sha-.*|ghcr.io/somatczk/${image_name}:sha-${{ steps.sha.outputs.short }}|" "$dockerfile"
            fi
          done

      - name: Create PR
        working-directory: romulus
        run: |
          git checkout -b hydra/bump-${{ steps.sha.outputs.short }}
          git add -A
          git diff --staged --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(hydra): bump image tags to sha-${{ steps.sha.outputs.short }}"
          git push origin hydra/bump-${{ steps.sha.outputs.short }}
          gh pr create \
            --title "chore(hydra): bump image tags to sha-${{ steps.sha.outputs.short }}" \
            --body "Auto-generated by hydra build pipeline." \
            --base master
        env:
          GH_TOKEN: ${{ secrets.ROMULUS_PAT }}
