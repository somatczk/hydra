version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /dashboard
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directories:
      - /docker/engine
      - /docker/dashboard
      - /docker/backtest
      - /docker/ml
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
